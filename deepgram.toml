[meta]
title = "Deno Flux"
description = "Get started using Deepgram's Flux real-time transcription with this Deno demo app"
author = "Deepgram DX Team <devrel@deepgram.com> (https://developers.deepgram.com)"
repository = "https://github.com/deepgram-starters/deno-flux"
useCase = "flux"
language = "typescript"
framework = "deno"
tags = ["flux", "streaming", "speech-to-text", "real-time", "turn-detection", "deno", "typescript"]

[check]
command = ["git --version", "deno --version"]
message = "All prerequisites installed"

[install.pre]
command = "git submodule update --init --recursive"
message = "Submodules initialized"

[install]
command = ["deno install", "cd frontend && corepack pnpm install"]
message = "Dependencies installed"

[install.post]
command = "test -f .env || cp sample.env .env"
message = "Environment configuration ready"

[start.pre]
command = "test -f .env || (echo '❌ .env not found. Run: cp sample.env .env' && exit 1)"
message = "Environment validated"

[start]
command = ["deno run --allow-net --allow-read --allow-env server.ts", "cd frontend && pnpm run dev -- --port 8080 --no-open"]
parallel = true
message = "Application running on http://localhost:8080"

[update]
command = "git submodule update --remote --merge"
message = "Submodules updated"

[clean]
command = ["rm -rf frontend/node_modules", "rm -rf frontend/.vite"]
message = "Build artifacts cleaned"

[test]
command = "cd contracts && ./tests/run-flux-app.sh"
message = "Tests complete"

[eject-frontend]
command = "make eject-frontend"
message = "Frontend ejected successfully"
